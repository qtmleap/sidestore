name: Integration
on:
  push:
    branches-ignore:
      - main
      - master
  pull_request:

jobs:
  commitlint:
    name: Commit Lint
    runs-on: ubuntu-latest
    if: github.event.action != 'closed' || github.event.pull_request.merged != true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock', '**/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Install commitlint
        run: |
          bun install conventional-changelog-conventionalcommits
          bun install @commitlint/config-conventional@latest
          bun install commitlint@latest
      - name: Validate PR commits
        if: github.event_name == 'pull_request'
        run: |
          bunx commitlint \
            --from ${{ github.event.pull_request.head.sha }}~${{ github.event.pull_request.commits }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --verbose
      - name: Validate last commit
        if: github.event_name == 'push'
        run: bunx commitlint --last --verbose

  check:
    name: Code Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock', '**/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      # Uncomment when the project uses Prisma (or similar codegen).
      # - name: Generate Prisma client
      #   run: bun run prisma generate
      - name: Biome check
        run: bunx --bun biome check

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock', '**/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      # Uncomment when the project uses Prisma (or similar codegen).
      # - name: Generate Prisma client
      #   run: bun run prisma generate
      - name: Generate Worker types
        run: bun run cf-typegen
        continue-on-error: true
      - name: Type check
        run: bun run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock', '**/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      # Uncomment when the project uses Prisma (or similar codegen).
      # - name: Generate Prisma client
      #   run: bun run prisma generate
      - name: Vite build
        run: bun run build
        env:
          CLOUDFLARE_ENV: staging

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock', '**/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      # Uncomment when the project uses Prisma (or similar codegen).
      # - name: Generate Prisma client
      #   run: bun run prisma generate
      - name: Run tests
        run: bun test
