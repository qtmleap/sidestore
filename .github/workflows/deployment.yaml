name: Deploy to Cloudflare Workers
on:
  pull_request:
    branches:
      - master
      - main
      - develop
    types: [closed]
  workflow_dispatch:

jobs:
  deploy:
    name: Wrangler Deploy
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock', '**/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Determine environment
        run: |
          if [[ '${{ github.event.pull_request.base.ref }}' == '${{ github.event.repository.default_branch }}' ]] \
            || [[ '${{ github.event_name }}' == 'workflow_dispatch' && '${{ github.ref_name }}' == '${{ github.event.repository.default_branch }}' ]]; then
            echo "ENVIRONMENT=production" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=staging" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Uncomment when the project uses Prisma (or similar codegen).
      # - name: Generate Prisma client
      #   run: bun run prisma generate

      - name: Build
        run: bun run build
        env:
          CLOUDFLARE_ENV: ${{ env.ENVIRONMENT }}

      - name: Wrangler deploy
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: latest
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env ${{ env.ENVIRONMENT }}
